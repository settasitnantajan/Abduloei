name: Event Reminders

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Call event reminders endpoint
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://abduloei-app.vercel.app/api/cron/event-reminders"
